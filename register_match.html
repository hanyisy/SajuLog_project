<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./resources/css/font.css" type="text/css">
    <link rel="stylesheet" href="./resources/css/mainpage.css" type="text/css">
    <link rel="stylesheet" href="./resources/css/register.css" type="text/css">
    <title>궁합 입력페이지</title>
</head>
<body>
    <header></header>

    <section class="register_sec1">
        <div class="register_backbtn"><a href="./index.html"><img src="https://land.withusmk.co.kr/assets/saju/resources/img/ui/arrow-2.webp" alt=""></a></div>
        <div class="register_title"><img src="./resources/img/register/match_subTit.webp" alt=""></div>
    </section>

    <section class="register_match_addUserPopup_sec off">
        <div class="register_match_addUserPopup">
            <div class="register_match_closeBtn js_match_closePop"><p>&#215;</p></div>
            <div class="register_match_addUserTop">
                <h2>새 사주 입력</h2>
                <p>저장해두면 다음 궁합에서 바로 불러올 수 있어요</p>
            </div>
            <form method="post" action="apply.html" name="saju_register_match_new">
                <div class="register_match_addUserMid">
                    <div class="register_formOption">
                        <div class="register_optionBox">
                            <div class="register_optionName">
                                <p>이름</p>
                                <span>초성으로만 입력하지 마시고, 전체 이름을 작성해주세요</span>
                            </div>
                            <div class="register_option">
                                <input type="text" name="name" class="user-name" placeholder="이름" required />
                            </div>
                        </div>
                    </div>
                    <div class="register_formOption">
                        <div class="register_optionBox">
                            <div class="register_optionName"><p>생년월일</p></div>
                            <div class="register_option register_birth">
                                <div class="register_select">
                                    <select name="option2" required>
                                        <option value="양력" selected>양력</option>
                                        <option value="음력">음력</option>
                                    </select>
                                </div>
                                <div class="register_input">
                                    <input type="text" name="option3" maxlength="10" placeholder="YYYY-MM-DD" oninput="autoHyphen(this)" inputmode="numeric">
                                </div>
                            </div>
                        </div>
                        <div class="register_optionBox">
                            <div class="register_optionName register_birthTime_name">
                                <p>태어난 시간</p>
                            </div>
                            <div class="register_option">
                                <div class="register_select">
                                    <select name="option4" class="register_birthTime_yes js_register_birthTime_yes" onchange="register_birthTimeYes_ch()" required>
                                        <option value="" selected>선택하세요</option>
                                        <option value="자시"><b>자시 (子時)</b> | 23:30 ~ 01:30</option>
                                        <option value="축시"><b>축시 (丑時)</b> | 01:30 ~ 03:30</option>
                                        <option value="인시"><b>인시 (寅時)</b> | 03:30 ~ 05:30</option>
                                        <option value="묘시"><b>묘시 (卯時)</b> | 05:30 ~ 07:30</option>
                                        <option value="진시"><b>진시 (辰時)</b> | 07:30 ~ 09:30</option>
                                        <option value="사시"><b>사시 (巳時)</b> | 09:30 ~ 11:30</option>
                                        <option value="오시"><b>오시 (午時)</b> | 11:30 ~ 13:30</option>
                                        <option value="미시"><b>미시 (未時)</b> | 13:30 ~ 15:30</option>
                                        <option value="신시"><b>신시 (申時)</b> | 15:30 ~ 17:30</option>
                                        <option value="유시"><b>유시 (酉時)</b> | 17:30 ~ 19:30</option>
                                        <option value="술시"><b>술시 (戌時)</b> | 19:30 ~ 21:30</option>
                                        <option value="해시"><b>해시 (亥時)</b> | 21:30 ~ 23:30 </option>
                                    </select>
                                </div>
                            </div>
                            <div class="register_birthtime_checkBox">
                                <div class="register_ckeck js_register_birthTime_no">
                                    <label for="register_birthTime_nos">
                                        <input type="checkbox" class="register_birthTime_no" id="register_birthTime_nos" value="시간모름" onchange="register_birthTimeNo_ch(this)"> <span>시간 모름</span> 
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="register_formOption" style="border-bottom: none;">
                        <div class="register_optionBox">
                            <div class="register_optionName"><p>성별</p></div>
                            <div class="register_option gender_select">
                                <input type="radio" id="op5_1" name="option5" required value="여성" >
                                <label for="op5_1">여성</label>
                                <input type="radio" id="op5_2" name="option5" required value="남성" >
                                <label for="op5_2">남성</label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="register_match_addUserBot">
                    <div class="register_match_closePop js_match_closePop">취소</div>
                    <div class="register_match_savePop js_match_savePop">저장하고 선택</div>
                </div>
            </form>
        </div>
    </section>

    <section class="register_match_sec2">
        <form method="post" action="apply.html" name="saju_register">
            <div class="register_formOption">
                <div class="register_optionBox">
                    <div class="register_optionName">
                        <p style="text-align: center;">궁합을 확인할 사람을 선택해주세요</p>
                    </div>
                    <div class="register_option match_selectUser js_match_selectUserCard">
                        <input type="text" name="option1" style="position: absolute; width: 1px; height: 1px; pointer-events: none; z-index: -100; left: 1000%;" required />
                        <input type="text" name="option2" style="position: absolute; width: 1px; height: 1px; pointer-events: none; z-index: -100; left: 1000%;" required />
                        <div class="match_user1">
                            <div class="match_noneUser">
                                <h1>?</h1>
                                <div class="js_match_choose_type1 match_chooseUser1">&#10003; 선택하기</div>
                                <div class="js_match_choose_type2" onclick="open_newUserpop('option1')">+ 신규입력</div>
                            </div>
                            <div class="match_user js_match_user">
                                <div class="match_user_icon js_match_user_icon"><img src="" alt=""></div>
                                <h1 class="js_match_user_Name">User</h1>
                                <div class="match_change_user match_chooseUser1">교체하기</div>
                            </div>
                        </div>
                        <div class="match_user2">
                            <div class="match_noneUser">
                                <h1>?</h1>
                                <div class="js_match_choose_type1 match_chooseUser2">&#10003; 선택하기</div>
                                <div class="js_match_choose_type2" onclick="open_newUserpop('option2')">+ 신규입력</div>
                            </div>
                            <div class="match_user js_match_user">
                                <div class="match_user_icon js_match_user_icon"><img src="" alt=""></div>
                                <h1 class="js_match_user_Name">User</h1>
                                <div class="match_change_user match_chooseUser2">교체하기</div>
                            </div>
                        </div>
                    </div>
                    <div class="register_userListBox js_register_userListBox off">
                        <div class="register_matchlist_closeBtn js_match_listClose"><p>&#215;</p></div>
                        <div id="user-list-container" style="color: black;"></div>
                    </div>
                    <div class="register_saveBtn js_openNewUserPop" style="margin-bottom: 5%;"> ← 새로운 사주 추가하기</div>
                </div>
            </div>

            <div class="register_formOption">
                <div class="register_optionName">
                    <p style="text-align: center;">두 사람은 어떤 관계인가요?</p>
                </div>
                <div class="register_option">
                    <div class="register_option relation_select">
                        <input type="radio" id="op3_1" name="option3" required value="친구" >
                        <label for="op3_1">친구</label>
                        <input type="radio" id="op3_2" name="option3" required value="썸남 썸녀" >
                        <label for="op3_2">썸남 썸녀</label>
                        <input type="radio" id="op3_3" name="option3" required value="연인" >
                        <label for="op3_3">연인</label>
                        <input type="radio" id="op3_4" name="option3" required value="배우자" >
                        <label for="op3_4">배우자</label>
                        <input type="radio" id="op3_5" name="option3" required value="전연인" >
                        <label for="op3_5">전연인</label>
                        <input type="radio" id="op3_6" name="option3" required value="전아내 전남편" >
                        <label for="op3_6">전아내 전남편</label>
                        <input type="radio" id="op3_7" name="option3" required value="부모와 자녀" >
                        <label for="op3_7">부모와 자녀</label>
                        <input type="radio" id="op3_8" name="option3" required value="형제/자매" >
                        <label for="op3_8">형제/자매</label>
                        <input type="radio" id="op3_9" name="option3" required value="직장동료" >
                        <label for="op3_9">직장동료</label>
                        <input type="radio" id="op3_10" name="option3" required value="사업 파트너" >
                        <label for="op3_10">사업 파트너</label>
                        <input type="radio" id="op3_11" name="option3" required value="아이돌과 팬" >
                        <label for="op3_11">아이돌과 팬</label>
                        <input type="radio" id="op3_12" name="option3" required value="아이돌과 아이돌" >
                        <label for="op3_12">아이돌과 아이돌</label>
                        <input type="radio" id="op3_13" name="option3" required value="고양이와 집사" >
                        <label for="op3_13">고양이와 집사</label>
                        <input type="radio" id="op3_14" name="option3" required value="강아지와 주인" >
                        <label for="op3_14">강아지와 주인</label>
                        <div class="register_textInput">
                            <input type="text" name="option3" class="js_register_userrelation_direct" placeholder="직접 입력">
                        </div>
                    </div>
                </div>
            </div>

            <div class="register_formOption" style="border-bottom: none;">
                <div class="register_optionBox">
                    <div class="register_optionName">
                        <p style="text-align: center;">각자의 역할을 입력해주세요 <span style="opacity: 0.5;">(선택)</span></p>
                    </div>
                    <div class="register_option register_relation_option">
                        <p>
                            <span class="js_relation_user1">User1</span>의 역할
                        </p>
                        <input type="text" name="option4" class="user-name" placeholder="예) 엄마, 남자친구, 팬" required />
                    </div>
                    <div class="register_option register_relation_option">
                        <p>
                            <span class="js_relation_user2">User2</span>의 역할
                        </p>
                        <input type="text" name="option5" class="user-name" placeholder="예) 아빠, 여자친구, 아이돌" required />
                    </div>
                </div>

                <div class="register_saveBtn"><a href="./result_match.html" style="color: black; width: 100%; height: 100%; display: block;">궁합보기</a></div>
                <!-- <button type="submit" class="register_saveBtn">궁합보기</button> -->
            </div>
            
        </form>
        <div class="register_formFrame">
                <div class="register_formFrame_deco">
                    <div style="position: absolute; top: 0; left: 0; width: 15%; transform: translate(-5%,0%);"><img src="https://land.withusmk.co.kr/assets/saju/resources/img/ui/saju_frameBox_TL.webp" alt=""></div>
                    <div style="position: absolute; top: 0; right: 0; width: 15%; transform: translate(5%,0%);"><img src="https://land.withusmk.co.kr/assets/saju/resources/img/ui/saju_frameBox_TR.webp" alt=""></div>
                    <div style="position: absolute; bottom: 0; left: 0; width: 15%; transform: translate(-5%,-25%);"><img src="https://land.withusmk.co.kr/assets/saju/resources/img/ui/saju_frameBox_BL.webp" alt=""></div>
                    <div style="position: absolute; bottom: 0; right: 0; width: 15%; transform: translate(5%,-25%);"><img src="https://land.withusmk.co.kr/assets/saju/resources/img/ui/saju_frameBox_BR.webp" alt=""></div>
                </div>
                <div style="position: absolute; top: 0; left: 50%; width: 75%; transform: translate(-50%,0%);"><img src="https://land.withusmk.co.kr/assets/saju/resources/img/ui/saju_frameBox_T.webp" alt=""></div>
                <div style="position: absolute; bottom: 0; left: 50%; width: 75%; transform: translate(-50%,-6.5%);"><img src="https://land.withusmk.co.kr/assets/saju/resources/img/ui/saju_frameBox_B.webp" alt=""></div>
                <div style="position: absolute; bottom: 0; left: 0; width: 55%; transform:  scaleY(5.8) translate(-1.5%,-45%);"><img src="https://land.withusmk.co.kr/assets/saju/resources/img/ui/saju_frameBox_L.webp" alt=""></div>
                <div style="position: absolute; bottom: 0; right: 0; width: 55%; transform: scaleY(5.8) translate(1.5%,-45%);"><img src="https://land.withusmk.co.kr/assets/saju/resources/img/ui/saju_frameBox_R.webp" alt=""></div>
            </div>
    </section>







    <footer></footer>


    <section class="sticky_Bottom_Bar js_sticky_Bottom_Bar"> </section>

    <script src="./resources/js/register_match.js"></script>

    <!-- 템플릿.js -->
    <script src="./resources/js/common.js"></script>
</body>
</html>
